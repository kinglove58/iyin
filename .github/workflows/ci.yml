name: CI
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: { version: "0.7.17", enable-cache: true }
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: uv sync --frozen --group dev
      - run: uv run ruff check .
      - run: uv run mypy
      - run: uv run pytest
      - run: uv run python -m services.evaluation.runner
      - run: uv build
        working-directory: services/crawler
      - run: uv run scrapy list
        working-directory: services/crawler

  web:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm, cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose config --quiet
      - run: docker compose build api worker web
