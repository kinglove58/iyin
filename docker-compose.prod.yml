services:
  postgres:
    ports: []

  redis:
    ports: []

  minio:
    ports: []

  api:
    ports: []

  caddy:
    image: caddy:2-alpine
    ports: ["80:80", "443:443"]
    volumes:
      - ./infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      api: { condition: service_healthy }
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:

networks:
  default:
    external: true
    name: afs-external-net
